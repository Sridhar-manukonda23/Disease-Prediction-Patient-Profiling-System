<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Analyzing Symptoms...</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#eef6ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:650px;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.step{
font-size:20px;
margin:15px;
opacity:.3;
transition:.5s;
}

.active{
opacity:1;
color:#0d6efd;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<h1>🩺 MediPredict AI</h1>

<h4 class="mb-4">
Analyzing Patient Symptoms...
</h4>

<div id="s1" class="step">
✔ Collecting Patient Information
</div>

<div id="s2" class="step">
✔ Encoding Symptoms
</div>

<div id="s3" class="step">
✔ Running Random Forest Model
</div>

<div id="s4" class="step">
✔ Calculating Confidence Score
</div>

<div id="s5" class="step">
✔ Preparing Report
</div>

<div class="progress mt-4">

<div id="bar"
class="progress-bar progress-bar-striped progress-bar-animated"
style="width:0%">
</div>

</div>

</div>

<script>

const steps=["s1","s2","s3","s4","s5"];

let i=0;

const timer=setInterval(()=>{

document.getElementById(steps[i]).classList.add("active");

document.getElementById("bar").style.width=((i+1)*20)+"%";

i++;

if(i===5){

clearInterval(timer);

setTimeout(submitForm,600);

}

},500);

function submitForm(){

const data=JSON.parse(sessionStorage.getItem("predictionData"));

const form=document.createElement("form");

form.method="POST";

form.action="/predict";

for(const key in data){

if(Array.isArray(data[key])){

data[key].forEach(v=>{

const input=document.createElement("input");

input.type="hidden";

input.name=key;

input.value=v;

form.appendChild(input);

});

}else{

const input=document.createElement("input");

input.type="hidden";

input.name=key;

input.value=data[key];

form.appendChild(input);

}

}

document.body.appendChild(form);

form.submit();

}

</script>

</body>

</html>
